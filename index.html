<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --rose: #f2c4ce;
  --rose-deep: #d4788a;
  --rose-soft: #fce8ed;
  --rose-pale: #fff4f7;
  --emerald: #1a6b47;
  --emerald-mid: #2ecc8b;
  --emerald-pale: #e1f5ee;
  --gold: #b8892a;
  --gold-light: #e8c06a;
  --text-dark: #3a1f2a;
  --text-mid: #7a4a5a;
  --text-soft: #b08090;
}

body{
  background: linear-gradient(160deg, #fff4f7 0%, #fce8ed 40%, #e8f5f0 100%);
  min-height:100vh;
  font-family:'Cormorant Garamond',serif;
  color: var(--text-dark);
  overflow-x:hidden;
}

/* floating petals bg */
.petal{
  position:fixed;
  border-radius:50% 0 50% 0;
  opacity:0;
  pointer-events:none;
  animation: petalFall linear infinite;
}
@keyframes petalFall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:0;}
  10%{opacity:0.35;}
  90%{opacity:0.15;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

.app{
  max-width:680px;
  margin:0 auto;
  padding:44px 22px 80px;
  position:relative;
  z-index:1;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:44px;
  animation:fadeDown .9s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);}}

.gem-wrap{
  display:inline-block;
  margin-bottom:18px;
  animation:gemFloat 4s ease-in-out infinite;
  filter: drop-shadow(0 6px 18px rgba(46,204,139,0.35)) drop-shadow(0 2px 8px rgba(210,120,138,0.25));
}
@keyframes gemFloat{
  0%,100%{transform:translateY(0) rotate(-2deg);}
  50%{transform:translateY(-8px) rotate(2deg);}
}

.header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5.5vw,3rem);
  font-weight:700;
  background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-mid) 40%, var(--rose-deep) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:.03em;
  margin-bottom:6px;
}
.header p{
  font-style:italic;
  color:var(--text-soft);
  letter-spacing:.12em;
  font-size:1rem;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(212,120,138,0.18);
  border-radius:20px;
  padding:26px;
  margin-bottom:22px;
  backdrop-filter:blur(12px);
  animation:fadeUp .7s ease both;
  box-shadow: 0 2px 24px rgba(210,120,138,0.08), 0 1px 4px rgba(26,107,71,0.06);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card:nth-child(2){animation-delay:.08s;}
.card:nth-child(3){animation-delay:.16s;}
.card:nth-child(4){animation-delay:.24s;}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--emerald);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.card-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(46,204,139,.3),transparent);
}

/* INPUTS */
.field{
  width:100%;
  background:rgba(255,255,255,.8);
  border:1px solid rgba(212,120,138,.28);
  border-radius:12px;
  padding:13px 16px;
  color:var(--text-dark);
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;
  outline:none;
  transition:border-color .25s,box-shadow .25s;
  margin-bottom:10px;
}
.field:focus{border-color:var(--emerald-mid);box-shadow:0 0 0 3px rgba(46,204,139,.12);}
.field::placeholder{color:var(--text-soft);font-style:italic;}
textarea.field{min-height:96px;resize:vertical;line-height:1.65;}

/* UPLOAD TABS */
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tab{
  flex:1;padding:10px 8px;
  background:rgba(255,255,255,.5);
  border:1px solid rgba(212,120,138,.2);
  border-radius:10px;
  color:var(--text-soft);
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;
  cursor:pointer;
  text-align:center;
  transition:all .25s;
}
.tab.active{
  background:rgba(26,107,71,.08);
  border-color:var(--emerald-mid);
  color:var(--emerald);
  font-weight:500;
}

/* DROP ZONE */
.dropzone{
  border:2px dashed rgba(212,120,138,.35);
  border-radius:14px;
  padding:26px 16px;
  text-align:center;
  cursor:pointer;
  transition:all .25s;
  background:rgba(252,232,237,.25);
  margin-bottom:14px;
}
.dropzone:hover{border-color:var(--rose-deep);background:rgba(252,232,237,.5);}
.dropzone p{font-size:.9rem;color:var(--text-soft);font-style:italic;margin-top:8px;}
.dropzone p.hint{font-size:.78rem;margin-top:4px;color:var(--text-soft);opacity:.6;}
#fileInput,#videoInput{display:none;}

/* MEDIA GRID */
.media-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
  gap:9px;margin-top:4px;
}
.media-thumb{
  position:relative;aspect-ratio:1;
  border-radius:11px;overflow:hidden;
  border:1px solid rgba(212,120,138,.2);
  animation:popIn .35s ease both;
  cursor:pointer;
}
@keyframes popIn{from{opacity:0;transform:scale(.82);}to{opacity:1;transform:scale(1);}}
.media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-badge{
  position:absolute;bottom:5px;left:5px;
  background:rgba(255,255,255,.82);
  color:var(--emerald);
  border-radius:5px;padding:2px 7px;
  font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;
  font-family:'Playfair Display',serif;
}
.thumb-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.18);
}
.thumb-rm{
  position:absolute;top:4px;right:4px;
  background:rgba(255,255,255,.85);
  border:none;border-radius:50%;
  width:22px;height:22px;
  color:#c0445a;cursor:pointer;
  font-size:13px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.media-thumb:hover .thumb-rm{opacity:1;}
.media-count{font-size:.8rem;color:var(--text-soft);text-align:right;margin-top:8px;font-style:italic;}

/* GENERATE BTN */
.gen-btn{
  width:100%;padding:17px;
  background:linear-gradient(135deg,var(--emerald) 0%,#0d4d32 100%);
  border:none;border-radius:14px;
  color:#fff;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;letter-spacing:.07em;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(26,107,71,.28),0 2px 8px rgba(210,120,138,.12);
  position:relative;overflow:hidden;
}
.gen-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  transform:translateX(-100%);
  transition:transform .5s;
}
.gen-btn:hover::after{transform:translateX(100%);}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,107,71,.38);}
.gen-btn:active{transform:translateY(0);}

/* ====== MODAL ====== */
.modal-wrap{
  position:fixed;inset:0;
  background:rgba(250,235,240,.97);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .45s;
  overflow-y:auto;
  padding:20px;
}
.modal-wrap.open{opacity:1;pointer-events:all;}

.preview{
  width:min(620px,100%);
  background:#fff;
  border-radius:24px;
  border:1px solid rgba(212,120,138,.18);
  box-shadow:0 8px 48px rgba(210,120,138,.16),0 2px 12px rgba(26,107,71,.08);
  padding:40px 28px 36px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* rose tint corners */
.preview::before,.preview::after{
  content:'';position:absolute;
  border-radius:50%;
  pointer-events:none;
}
.preview::before{
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(242,196,206,.35),transparent 70%);
  top:-80px;right:-60px;
}
.preview::after{
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(225,245,238,.45),transparent 70%);
  bottom:-60px;left:-40px;
}

.preview-gem{
  margin:0 auto 18px;
  display:inline-block;
  animation:gemFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 4px 14px rgba(46,204,139,.4)) drop-shadow(0 2px 8px rgba(210,120,138,.3));
}

.preview-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,6.5vw,3.6rem);
  font-weight:700;
  background:linear-gradient(135deg,var(--emerald) 0%,var(--emerald-mid) 45%,var(--rose-deep) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:.04em;
  margin-bottom:6px;
  animation:nameIn 1s ease both;
}
@keyframes nameIn{from{opacity:0;letter-spacing:.4em;}to{opacity:1;letter-spacing:.04em;}}

.preview-sub{
  font-style:italic;
  font-size:1rem;
  color:var(--text-soft);
  letter-spacing:.18em;
  margin-bottom:30px;
}

/* ===== DIAPORAMA ===== */
.diapo-wrap{
  position:relative;
  width:100%;max-width:400px;
  margin:0 auto 10px;
  aspect-ratio:1;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(212,120,138,.22);
  box-shadow:0 4px 24px rgba(210,120,138,.14),0 2px 8px rgba(26,107,71,.08);
  background:#fce8ed;
}

.slide{
  position:absolute;inset:0;
  opacity:0;
  transition:opacity .9s ease;
  display:flex;align-items:center;justify-content:center;
}
.slide.active{opacity:1;z-index:2;}
.slide img{width:100%;height:100%;object-fit:cover;}
.slide video{width:100%;height:100%;object-fit:cover;}

/* slide overlay gradient top + bottom */
.slide-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.12) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.15) 100%);
  pointer-events:none;z-index:3;
}

/* placeholder */
.slide-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:linear-gradient(135deg,#fce8ed,#e8f5f0);
  color:var(--text-soft);font-style:italic;font-size:.95rem;
}

/* nav arrows */
.diapo-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:10;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(6px);
  border:1px solid rgba(212,120,138,.2);
  border-radius:50%;
  width:36px;height:36px;
  color:var(--rose-deep);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.diapo-btn:hover{background:rgba(255,255,255,.95);transform:translateY(-50%) scale(1.08);}
.diapo-btn.prev{left:9px;}
.diapo-btn.next{right:9px;}

/* media type badge */
.slide-badge{
  position:absolute;top:10px;left:10px;
  z-index:10;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(4px);
  border-radius:7px;padding:3px 9px;
  font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--emerald);
  font-family:'Playfair Display',serif;
}

/* progress bar */
.diapo-progress{
  position:absolute;bottom:0;left:0;right:0;
  height:3px;background:rgba(255,255,255,.3);
  z-index:10;
}
.diapo-progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--emerald-mid),var(--rose-deep));
  width:0%;
  transition:width linear;
}

/* dot nav */
.dot-nav{display:flex;justify-content:center;gap:7px;margin-bottom:24px;flex-wrap:wrap;}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(212,120,138,.3);
  cursor:pointer;transition:all .3s;
}
.dot.on{background:var(--rose-deep);box-shadow:0 0 0 3px rgba(212,120,138,.2);width:20px;border-radius:4px;}
.dot.vid.on{background:var(--emerald);}

.preview-msg{
  font-size:1.1rem;line-height:1.85;
  color:var(--text-mid);
  max-width:440px;margin:0 auto 26px;
  font-style:italic;
}

.hearts{display:flex;justify-content:center;gap:10px;margin-bottom:18px;}
.heart{font-size:1.3rem;animation:hb 1.5s ease-in-out infinite;}
.heart:nth-child(2){animation-delay:.2s;}
.heart:nth-child(3){animation-delay:.4s;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

/* gem corner decorations */
.gem-corner{position:absolute;opacity:.12;pointer-events:none;}
.gem-corner.tl{top:-10px;left:-10px;transform:rotate(40deg);}
.gem-corner.br{bottom:-10px;right:-10px;transform:rotate(220deg);}

.close-btn{
  position:fixed;top:16px;right:16px;
  z-index:300;
  background:rgba(255,255,255,.85);
  border:1px solid rgba(212,120,138,.25);
  color:var(--rose-deep);
  width:42px;height:42px;border-radius:50%;
  font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;backdrop-filter:blur(6px);
}
.close-btn:hover{transform:rotate(90deg);background:#fff;}

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:250;}
</style>
</head>
<body>

<div id="petals-wrap"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="gem-wrap">
      <svg width="74" height="74" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7fffcc"/>
            <stop offset="45%" stop-color="#2ecc8b"/>
            <stop offset="100%" stop-color="#d4788a"/>
          </linearGradient>
          <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f2c4ce"/>
            <stop offset="100%" stop-color="#1a6b47"/>
          </linearGradient>
        </defs>
        <polygon points="50,8 78,22 85,50 78,78 50,92 22,78 15,50 22,22" fill="url(#g1)" opacity=".93"/>
        <polygon points="50,19 70,30 76,50 70,70 50,81 30,70 24,50 30,30" fill="url(#g2)" opacity=".55"/>
        <polygon points="50,30 63,37 67,50 63,63 50,70 37,63 33,50 37,37" fill="#fff" opacity=".2"/>
        <polygon points="50,8 78,22 60,31 50,19" fill="#fff" opacity=".32"/>
        <polygon points="50,19 60,31 55,50 44,38" fill="#fff" opacity=".14"/>
      </svg>
    </div>
    <h1>Happy Birthday</h1>
    <p>crée quelque chose d'unique & inoubliable</p>
  </div>

  <!-- NAME -->
  <div class="card">
    <div class="card-title">💎 Son prénom</div>
    <input class="field" type="text" id="nameInput" placeholder="Le prénom de ta reine…" maxlength="30">
  </div>

  <!-- MESSAGE -->
  <div class="card" style="animation-delay:.08s">
    <div class="card-title">✉️ Ton message</div>
    <textarea class="field" id="msgInput">Tu illumines chaque journée de ta présence. Joyeux anniversaire, ma plus belle rencontre. 🌿</textarea>
  </div>

  <!-- MEDIA -->
  <div class="card" style="animation-delay:.16s">
    <div class="card-title">🎬 Photos & Vidéos</div>

    <div class="tabs">
      <div class="tab active" id="tabPh" onclick="setTab('photo')">📷 Photos</div>
      <div class="tab" id="tabVi" onclick="setTab('video')">🎥 Vidéos</div>
    </div>

    <div class="dropzone" id="dropzone">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2ecc8b" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p id="dz-label">Clique ou glisse tes plus belles photos</p>
      <p class="hint" id="dz-hint">JPG · PNG · max 10 fichiers</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <input type="file" id="videoInput" accept="video/*" multiple>

    <div class="media-grid" id="mediaGrid"></div>
    <div class="media-count" id="mediaCount"></div>
  </div>

  <button class="gen-btn" id="genBtn">✨ Créer la surprise</button>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="modal">
  <canvas id="confetti-canvas"></canvas>
  <button class="close-btn" id="closeBtn">✕</button>

  <div class="preview" id="previewCard">
    <!-- corner gems -->
    <svg class="gem-corner tl" width="90" height="90" viewBox="0 0 100 100">
      <polygon points="50,5 80,28 80,72 50,95 20,72 20,28" fill="none" stroke="#2ecc8b" stroke-width="2.5"/>
      <polygon points="50,22 68,36 68,64 50,78 32,64 32,36" fill="rgba(46,204,139,.15)"/>
    </svg>
    <svg class="gem-corner br" width="90" height="90" viewBox="0 0 100 100">
      <polygon points="50,5 80,28 80,72 50,95 20,72 20,28" fill="none" stroke="#d4788a" stroke-width="2.5"/>
      <polygon points="50,22 68,36 68,64 50,78 32,64 32,36" fill="rgba(212,120,138,.15)"/>
    </svg>

    <!-- gem -->
    <div class="preview-gem">
      <svg width="80" height="80" viewBox="0 0 100 100">
        <polygon points="50,8 78,22 85,50 78,78 50,92 22,78 15,50 22,22" fill="url(#g1)" opacity=".95"/>
        <polygon points="50,19 70,30 76,50 70,70 50,81 30,70 24,50 30,30" fill="url(#g2)" opacity=".55"/>
        <polygon points="50,30 63,37 67,50 63,63 50,70 37,63 33,50 37,37" fill="#fff" opacity=".22"/>
        <polygon points="50,8 78,22 60,31 50,19" fill="#fff" opacity=".32"/>
      </svg>
    </div>

    <div class="preview-name" id="pName">Ton Amour</div>
    <div class="preview-sub">Happy Birthday · Joyeux Anniversaire</div>

    <!-- DIAPO -->
    <div class="diapo-wrap" id="diapoWrap">
      <button class="diapo-btn prev" id="prevBtn" onclick="navSlide(-1)">‹</button>
      <button class="diapo-btn next" id="nextBtn" onclick="navSlide(1)">›</button>
      <div class="slide-badge" id="slideBadge" style="display:none"></div>
      <div class="slide-overlay"></div>
      <div class="diapo-progress"><div class="diapo-progress-bar" id="progressBar"></div></div>
      <div id="slidesBox">
        <div class="slide active" id="defaultSlide">
          <div class="slide-placeholder">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d4788a" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Vos souvenirs ici</span>
          </div>
        </div>
      </div>
    </div>
    <div class="dot-nav" id="dotNav"></div>

    <div class="preview-msg" id="pMsg"></div>

    <div class="hearts">
      <span class="heart">🌸</span>
      <span class="heart">💎</span>
      <span class="heart">🌿</span>
    </div>
  </div>
</div>

<script>
/* ---- PETALS ---- */
const pw = document.getElementById('petals-wrap');
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='petal';
  const size=8+Math.random()*14;
  Object.assign(p.style,{
    width:size+'px',height:size+'px',
    left:Math.random()*100+'vw',
    background:Math.random()>.5?'rgba(242,196,206,.7)':'rgba(225,245,238,.65)',
    animationDuration:(12+Math.random()*14)+'s',
    animationDelay:(Math.random()*14)+'s',
  });
  pw.appendChild(p);
}

/* ---- TAB ---- */
let curTab='photo';
function setTab(t){
  curTab=t;
  document.getElementById('tabPh').classList.toggle('active',t==='photo');
  document.getElementById('tabVi').classList.toggle('active',t==='video');
  if(t==='photo'){
    document.getElementById('dz-label').textContent="Clique ou glisse tes plus belles photos";
    document.getElementById('dz-hint').textContent="JPG · PNG · max 10 fichiers";
    document.getElementById('dropzone').onclick=()=>document.getElementById('fileInput').click();
  } else {
    document.getElementById('dz-label').textContent="Clique ou glisse tes vidéos";
    document.getElementById('dz-hint').textContent="MP4 · MOV · WebM · max 10 fichiers";
    document.getElementById('dropzone').onclick=()=>document.getElementById('videoInput').click();
  }
}
setTab('photo');

/* ---- MEDIA ---- */
let media=[];
document.getElementById('fileInput').onchange=e=>addFiles(e.target.files,'image');
document.getElementById('videoInput').onchange=e=>addFiles(e.target.files,'video');
const dz=document.getElementById('dropzone');
dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='#2ecc8b';};
dz.ondragleave=()=>dz.style.borderColor='';
dz.ondrop=e=>{
  e.preventDefault();dz.style.borderColor='';
  const f=e.dataTransfer.files;
  const t=f[0]&&f[0].type.startsWith('video')?'video':'image';
  addFiles(f,t);
};

function addFiles(files,type){
  const rem=10-media.length;
  Array.from(files).slice(0,rem).forEach(f=>{
    if(!f.type.startsWith(type==='image'?'image/':'video/'))return;
    const r=new FileReader();
    r.onload=ev=>{media.push({type,src:ev.target.result});renderGrid();};
    r.readAsDataURL(f);
  });
}

function renderGrid(){
  const g=document.getElementById('mediaGrid');
  g.innerHTML='';
  media.forEach((m,i)=>{
    const el=document.createElement('div');
    el.className='media-thumb';
    if(m.type==='image'){
      el.innerHTML=`<img src="${m.src}"><span class="thumb-badge">Photo</span><button class="thumb-rm" data-i="${i}">✕</button>`;
    } else {
      el.innerHTML=`<video src="${m.src}" muted preload="metadata"></video>
        <div class="thumb-play"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d4788a" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#d4788a" stroke="none"/></svg></div>
        <span class="thumb-badge">Vidéo</span><button class="thumb-rm" data-i="${i}">✕</button>`;
    }
    g.appendChild(el);
  });
  g.querySelectorAll('.thumb-rm').forEach(b=>b.onclick=e=>{
    e.stopPropagation();media.splice(+b.dataset.i,1);renderGrid();
  });
  const ph=media.filter(m=>m.type==='image').length;
  const vi=media.filter(m=>m.type==='video').length;
  document.getElementById('mediaCount').textContent=media.length
    ?`${media.length} fichier${media.length>1?'s':''} · ${ph} photo${ph!==1?'s':''}, ${vi} vidéo${vi!==1?'s':''}`:'';
}

/* ---- DIAPO ---- */
let cur=0,slides=[],diapoTimer=null,progTimer=null;
const DELAY=4000;

function buildDiapo(){
  const box=document.getElementById('slidesBox');
  const dotNav=document.getElementById('dotNav');
  box.querySelectorAll('.slide:not(#defaultSlide)').forEach(s=>s.remove());
  dotNav.innerHTML='';slides=[];cur=0;
  clearInterval(diapoTimer);clearTimeout(progTimer);

  if(!media.length){
    document.getElementById('defaultSlide').style.display='';
    document.getElementById('prevBtn').style.display='none';
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('slideBadge').style.display='none';
    return;
  }
  document.getElementById('defaultSlide').style.display='none';
  document.getElementById('prevBtn').style.display=media.length>1?'flex':'none';
  document.getElementById('nextBtn').style.display=media.length>1?'flex':'none';

  media.forEach((m,i)=>{
    const s=document.createElement('div');
    s.className='slide'+(i===0?' active':'');
    s.dataset.type=m.type;
    if(m.type==='image') s.innerHTML=`<img src="${m.src}">`;
    else s.innerHTML=`<video src="${m.src}" controls playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
    box.appendChild(s);slides.push(s);

    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'')+(m.type==='video'?' vid':'');
    d.onclick=()=>goTo(i);
    dotNav.appendChild(d);
  });

  updateBadge();
  if(media.length>1) startAuto();
}

function goTo(i){
  clearInterval(diapoTimer);clearTimeout(progTimer);
  const vid=slides[cur].querySelector('video');if(vid)vid.pause();
  slides[cur].classList.remove('active');
  document.getElementById('dotNav').children[cur].classList.remove('on');
  cur=i;
  slides[cur].classList.add('active');
  document.getElementById('dotNav').children[cur].classList.add('on');
  updateBadge();
  resetProgress();
  if(media.length>1){
    if(media[cur].type==='video'){
      const v=slides[cur].querySelector('video');
      if(v){v.play().catch(()=>{});v.onended=()=>startAutoNext();}
    } else {
      startAuto();
    }
  }
}

function navSlide(d){goTo((cur+d+slides.length)%slides.length);}

function startAuto(){
  resetProgress();
  animProgress();
  diapoTimer=setTimeout(()=>goTo((cur+1)%slides.length),DELAY);
}
function startAutoNext(){goTo((cur+1)%slides.length);}

function resetProgress(){
  const bar=document.getElementById('progressBar');
  bar.style.transition='none';bar.style.width='0%';
}
function animProgress(){
  const bar=document.getElementById('progressBar');
  requestAnimationFrame(()=>{
    bar.style.transition=`width ${DELAY}ms linear`;
    bar.style.width='100%';
  });
}

function updateBadge(){
  const b=document.getElementById('slideBadge');
  if(!media.length){b.style.display='none';return;}
  b.style.display='block';
  b.textContent=media[cur].type==='video'?'🎥 Vidéo':'📷 Photo';
}

/* ---- GENERATE ---- */
document.getElementById('genBtn').onclick=()=>{
  const name=document.getElementById('nameInput').value.trim()||'Mon Amour';
  document.getElementById('pName').textContent=name;
  document.getElementById('pMsg').textContent=document.getElementById('msgInput').value.trim();
  buildDiapo();
  document.getElementById('modal').classList.add('open');
  setTimeout(fireConfetti,350);
};

document.getElementById('closeBtn').onclick=()=>{
  slides.forEach(s=>{const v=s.querySelector('video');if(v)v.pause();});
  clearInterval(diapoTimer);clearTimeout(progTimer);
  document.getElementById('modal').classList.remove('open');
  stopConfetti();
};

/* ---- CONFETTI ---- */
const cc=document.getElementById('confetti-canvas');
const cx=cc.getContext('2d');
let cfParts=[],cfFrame,cfOn=false;

function fireConfetti(){
  cc.width=window.innerWidth;cc.height=window.innerHeight;
  cfParts=[];cfOn=true;
  const cols=['#2ecc8b','#7fffcc','#f2c4ce','#d4788a','#b8892a','#fff','#1a6b47'];
  for(let i=0;i<130;i++){
    cfParts.push({
      x:Math.random()*cc.width,
      y:-20-Math.random()*80,
      r:Math.random()*6+2.5,
      c:cols[Math.floor(Math.random()*cols.length)],
      vy:Math.random()*3+1.5,
      vx:Math.random()*2.5-1.25,
      op:1,
      sh:Math.random()>.45?'gem':'circle'
    });
  }
  drawCF();
  setTimeout(stopConfetti,4200);
}
function drawCF(){
  if(!cfOn)return;
  cx.clearRect(0,0,cc.width,cc.height);
  cfParts=cfParts.filter(p=>p.op>0);
  cfParts.forEach(p=>{
    p.y+=p.vy;p.x+=p.vx;
    if(p.y>cc.height*.72)p.op-=.018;
    cx.globalAlpha=p.op;cx.fillStyle=p.c;
    if(p.sh==='circle'){cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();}
    else{
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.y*.04);
      cx.beginPath();const s=p.r;
      cx.moveTo(0,-s);cx.lineTo(s*.65,-s*.4);cx.lineTo(s*.65,s*.4);
      cx.lineTo(0,s);cx.lineTo(-s*.65,s*.4);cx.lineTo(-s*.65,-s*.4);
      cx.closePath();cx.fill();cx.restore();
    }
  });
  cx.globalAlpha=1;
  cfFrame=requestAnimationFrame(drawCF);
}
function stopConfetti(){cfOn=false;cancelAnimationFrame(cfFrame);cx.clearRect(0,0,cc.width,cc.height);}
</script>
